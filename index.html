<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de usuario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="wrapper">
    <section class="card">

      <header class="card-header">
        <h1>Crear cuenta</h1>
        <p>Completa los campos — validación en tiempo real</p>
      </header>

      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <p class="progress-label" id="progress-label">0 de 5 campos completados</p>

      <form id="form" novalidate autocomplete="off">

        <div class="field" id="field-name">
          <label for="inp-name">Nombre completo</label>
          <input type="text" id="inp-name" placeholder="Ej. Carlos Mendoza" maxlength="60" aria-describedby="err-name" />
          <p class="err-msg" id="err-name" role="alert"></p>
        </div>

        <div class="field" id="field-email">
          <label for="inp-email">Correo electrónico</label>
          <input type="text" id="inp-email" placeholder="tu@correo.com" maxlength="100" aria-describedby="err-email" />
          <p class="err-msg" id="err-email" role="alert"></p>
        </div>

        <div class="field" id="field-phone">
          <label for="inp-phone">Teléfono</label>
          <input type="tel" id="inp-phone" placeholder="+593 99 123 4567" maxlength="15" aria-describedby="err-phone" />
          <p class="err-msg" id="err-phone" role="alert"></p>
        </div>

        <div class="field" id="field-pass">
          <label for="inp-pass">Contraseña</label>
          <div class="pass-wrap">
            <input type="password" id="inp-pass" placeholder="Mínimo 8 caracteres" maxlength="64" aria-describedby="err-pass" />
            <button type="button" id="toggle-pass" aria-label="Mostrar contraseña">
              <svg id="eye-icon" viewBox="0 0 20 20" fill="none" width="18" height="18">
                <path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
              </svg>
            </button>
          </div>
          <div class="strength" id="strength">
            <span class="bar" id="bar0"></span>
            <span class="bar" id="bar1"></span>
            <span class="bar" id="bar2"></span>
            <span class="bar" id="bar3"></span>
            <span class="strength-label" id="strength-label"></span>
          </div>
          <p class="err-msg" id="err-pass" role="alert"></p>
        </div>

        <div class="field" id="field-role">
          <label for="inp-role">Rol</label>
          <div class="select-wrap">
            <select id="inp-role" aria-describedby="err-role">
              <option value="">Selecciona un rol...</option>
              <option value="dev">Desarrollador</option>
              <option value="design">Diseñador UI/UX</option>
              <option value="pm">Product Manager</option>
              <option value="data">Data Analyst</option>
              <option value="devops">DevOps / SRE</option>
            </select>
            <svg class="chevron" viewBox="0 0 12 8" fill="none">
              <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <p class="err-msg" id="err-role" role="alert"></p>
        </div>

        <button type="submit" class="btn-submit">Crear cuenta</button>

      </form>

      <div class="success" id="success" role="status" aria-live="polite">
        <svg viewBox="0 0 24 24" fill="none" width="20" height="20" aria-hidden="true">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
          <path d="M7 12.5l3.5 3.5 6-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Cuenta creada con éxito</span>
      </div>

    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
